# Install the R app.
#  https://www.r-project.org/
---
- stat:
    path: /Applications/R.app
  register: r_app_stat
  when: not r_app_force_install

- when: r_app_force_install or not (r_app_stat.stat.isdir is defined and r_app_stat.stat.isdir)
  block:
    - name: Download R package
      get_url:
        # Requires big sur or later (note URL).
        url: "https://cran.r-project.org/bin/macosx/big-sur-{{ ansible_facts['machine'] }}/base/R-{{ r_app_version }}-{{ ansible_facts['machine'] }}.pkg"
        dest: "{{ downloads }}/R.pkg"
        force: "{{ r_app_force_download }}"
        mode: u=rw

    - name: Install R
      command: "installer -pkg {{ downloads }}/R.pkg -target /"
      become: true
