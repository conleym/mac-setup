---
argument_specs:
  main:
    short_description: Install the iTerm2 browser plugin app.
    description: >-
      Downloads and installs the iTerm2 browser plugin app.
    options:
      iterm2_browser_plugin_app_name:
        description: >-
          Name of the iTerm2 browser plugin application
        type: str
        default: iTerm2
      iterm2_browser_plugin_browser_plugin_app_path:
        description: >-
          Directory where the iTerm2 browser plugin application should be installed.

          For example, `/Applications` or `{{ '~/Applications' | expanduser }}` would be reasonable choices.
        type: path
        default: /Applications
      iterm2_browser_plugin_force_download:
        description: >-
          If True, download the iTerm2 browser plugin, even if it's already been downloaded.
        type: bool
        default: false
      iterm2_browser_plugin_force_install:
        description: >-
          If True, install the iTerm2 browser plugin, even if it's already installed.
        default: false
      iterm2_browser_plugin_version:
        description: >-
          The version of the iTerm2 browser plugin to install.
        type: str
        # Default changes often. See defaults.
