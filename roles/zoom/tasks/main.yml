# Install the R app.
#  https://www.r-project.org/
---
- stat:
    path: /Applications/zoom.us.app
  register: zoom_stat
  when: not zoom_force_install

- set_fact:
    zoom_pkg_arch: "{{ '' if (ansible_facts['machine'] == 'x86_64') else '?archType=arm64' }}"

- when: zoom_force_install or not (zoom_stat.stat.isdir is defined and zoom_stat.stat.isdir)
  block:
    - name: Download Zoom package
      get_url:
        url: "https://www.zoom.us/client/{{ zoom_version }}/zoomusInstallerFull.pkg{{ zoom_pkg_arch }}"
        dest: "{{ downloads }}/Zoom.pkg"
        force: "{{ zoom_force_download }}"
        mode: u=rw

    - name: Install Zoom
      command: "installer -pkg {{ downloads }}/Zoom.pkg -target /"
      become: true
